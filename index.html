<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>3D Grand Piano — MIDI synced to falling stars</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg: #0a0a0f;
  --accent: #c9a84c;
  --accent2: #f5e2a0;
  --glow: #c9a84c55;
  --ivory: #f5f0e8;
  --ebony: #1a1610;
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  background: var(--bg);
  font-family: 'Space Mono', monospace;
  color: var(--accent);
  overflow: hidden;
}

body {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  position:relative;
}

body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse 90% 50% at 50% 90%, #1a120088 0%, transparent 70%),
    radial-gradient(ellipse 60% 60% at 50% 100%, #c9a84c0d 0%, transparent 60%);
  pointer-events:none; z-index:0;
}

body::after {
  content:'';
  position:fixed; inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:.45; pointer-events:none; z-index:1;
}

header {
  position:relative; z-index:12;
  text-align:center;
  margin-bottom:10px;
}
header h1 {
  font-family:'Cormorant Garamond', serif;
  font-size:clamp(1.4rem,3.5vw,2.4rem);
  font-weight:300;
  letter-spacing:.3em;
  color:var(--accent);
  text-shadow:0 0 40px var(--glow);
}
header p {
  font-size:.55rem;
  letter-spacing:.22em;
  color:#ffffff33;
  margin-top:3px;
  text-transform:uppercase;
}

#scene {
  position:relative; z-index:10;
  perspective:1000px;
  perspective-origin:50% 10%;
}
#piano-wrap {
  transform:rotateX(46deg) rotateZ(-0.5deg);
  transform-style:preserve-3d;
  filter:drop-shadow(0 70px 90px #000000dd);
}
#piano-body {
  position:relative;
  background:linear-gradient(180deg,#1e1a10 0%,#0d0b07 100%);
  border-radius:16px 16px 6px 6px;
  padding:18px 22px 24px;
  box-shadow:
    0 0 0 2px #3a3020,
    0 0 0 4px #090800,
    0 8px 0 4px #2a2010,
    0 16px 0 4px #1a1408,
    0 28px 40px #000;
  transform-style:preserve-3d;
}
#piano-body::before {
  content:'';
  position:absolute; top:0; left:8%; right:8%; height:1px;
  background:linear-gradient(90deg,transparent,#ffffff1a,var(--accent2)33,#ffffff1a,transparent);
}

#keys {
  position:relative;
  display:flex;
  align-items:flex-start;
  height:130px;
  user-select:none;
  overflow:visible;
}

.wkey {
  position:relative;
  flex-shrink:0;
  width:20px;
  height:125px;
  background:linear-gradient(180deg,#eae5db 0%,#f7f3ed 8%,#faf7f2 60%,#eae5db 100%);
  border:1px solid #c0b8a8;
  border-top:none;
  border-radius:0 0 4px 4px;
  margin:0 0.7px;
  cursor:pointer;
  transform-origin:top center;
  transition:transform .07s ease,background .07s ease,box-shadow .07s ease;
  box-shadow:
    inset 0 -3px 6px #00000020,
    inset 1px 0 0 #ffffff77,
    0 4px 8px #00000044,
    0 8px 16px #00000022;
  z-index:1;
}
.wkey:hover {
  background:linear-gradient(180deg,#fffdf8 0%,#fff 60%,#f0ece0 100%);
}
.wkey.active {
  transform:rotateX(5deg);
  background:linear-gradient(180deg,#fff9e4 0%,#ffed9a 40%,#f5d060 100%);
  box-shadow:
    inset 0 4px 10px #c9a84c44,
    0 0 18px #c9a84c33,
    0 2px 4px #00000077;
}
.note-label {
  position:absolute;
  bottom:4px; left:50%; transform:translateX(-50%);
  font-size:.38rem;
  letter-spacing:.03em;
  color:#00000033;
  pointer-events:none;
  white-space:nowrap;
}
.wkey.active .note-label { color:#c9a84c88; }

.bkey {
  position:absolute;
  width:13px;
  height:80px;
  background:linear-gradient(180deg,#2a2318 0%,#1a1610 30%,#0c0a07 80%,#1a1610 100%);
  border-radius:0 0 3px 3px;
  cursor:pointer;
  transform-origin:top center;
  z-index:2;
  top:0;
  transition:transform .07s ease,box-shadow .07s ease;
  box-shadow:
    inset 1px 0 0 #ffffff09,
    inset -1px 0 0 #00000077,
    0 6px 10px #000000aa,
    0 12px 20px #00000066,
    2px 0 0 #3a3020;
}
.bkey::before {
  content:'';
  position:absolute;
  top:3px; left:2px; right:2px; height:38%;
  background:linear-gradient(180deg,#3a3020 0%,transparent 100%);
  border-radius:2px 2px 0 0;
  opacity:.55;
}
.bkey::after {
  content:'';
  position:absolute;
  top:2px; left:2px; right:2px; height:2px;
  background:linear-gradient(90deg,transparent,#ffffff14,transparent);
  border-radius:2px;
}
.bkey:hover {
  box-shadow:
    inset 1px 0 0 #ffffff11,
    inset -1px 0 0 #00000077,
    0 6px 10px #000000aa,
    0 0 10px #c9a84c1a,
    2px 0 0 #3a3020;
}
.bkey.active {
  transform:rotateX(6deg);
  background:linear-gradient(180deg,#3a2800 0%,#c9a84c 60%,#a07830 100%);
  box-shadow:
    inset 0 2px 8px #00000077,
    0 0 18px #c9a84c66,
    0 4px 8px #000000aa;
}

#piano-front {
  height:24px;
  background:linear-gradient(180deg,#1c1710,#0d0b07);
  border-radius:0 0 6px 6px;
  margin-top:-1px;
  border-top:1px solid #3a3020;
  position:relative;
}
#piano-front::after {
  content:'GRAND';
  position:absolute;
  left:50%; transform:translateX(-50%);
  top:7px;
  font-family:'Cormorant Garamond',serif;
  font-size:.6rem;
  letter-spacing:.55em;
  color:var(--accent);
  opacity:.65;
}

.leg {
  position:absolute;
  bottom:-34px;
  width:12px; height:36px;
  background:linear-gradient(90deg,#1a1508,#2a2010,#1a1508);
  border-radius:0 0 3px 3px;
  box-shadow:0 8px 16px #000000aa;
}
.leg-l { left:24px; }
.leg-r { right:24px; }

#controls {
  position:relative; z-index:12;
  margin-top:28px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

.ctrl-row {
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  justify-content:center;
}

.btn {
  background:transparent;
  border:1px solid #c9a84c55;
  color:var(--accent);
  font-family:'Space Mono',monospace;
  font-size:.58rem;
  letter-spacing:.14em;
  padding:7px 16px;
  cursor:pointer;
  border-radius:2px;
  text-transform:uppercase;
  transition:all .2s;
  position:relative;
  overflow:hidden;
}
.btn::before {
  content:'';
  position:absolute; inset:0;
  background:var(--accent);
  opacity:0;
  transition:opacity .2s;
}
.btn:hover { border-color:var(--accent); box-shadow:0 0 16px var(--glow); }
.btn:hover::before { opacity:.08; }
.btn:active::before { opacity:.18; }
.btn.playing { border-color:var(--accent2); box-shadow:0 0 24px #c9a84c55; }

/* Clef-painikkeen valaistu/On-tila */
.btn.active-clef {
  border-color: var(--accent2);
  color: #ffffff;
  background: rgba(201, 168, 76, 0.2);
  box-shadow: 
    0 0 16px rgba(201, 168, 76, 0.6),
    inset 0 0 10px rgba(255, 226, 160, 0.4);
  text-shadow: 0 0 8px var(--accent2);
}

/* Opi-painikkeen aktiivinen tila (Syaani) */
.btn.active-learn {
  border-color: #00f5d4;
  color: #ffffff;
  background: rgba(0, 245, 212, 0.15);
  box-shadow: 
    0 0 16px rgba(0, 245, 212, 0.6),
    inset 0 0 10px rgba(0, 245, 212, 0.3);
  text-shadow: 0 0 8px #00f5d4;
}

#upload-label {
  display:flex; align-items:center; gap:7px;
  padding:7px 16px;
  border:1px dashed #c9a84c33;
  color:#c9a84c77;
  font-size:.58rem;
  letter-spacing:.12em;
  text-transform:uppercase;
  cursor:pointer;
  border-radius:2px;
  transition:all .22s;
}
#upload-label:hover { border-color:var(--accent); color:var(--accent); box-shadow:0 0 16px var(--glow); }
#file-input { display:none; }

/* Vertikaalinen pino ja sointunäyttö */
.midi-panel {
  display: flex;
  align-items: center;
  gap: 12px;
  border: 1px solid rgba(201, 168, 76, 0.25);
  padding: 8px 14px;
  border-radius: 4px;
  background: rgba(13, 11, 7, 0.6);
  backdrop-filter: blur(4px);
}
.dropdowns-column {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.dropdown-wrap {
  position:relative;
  display:flex;
  flex-direction:column;
  gap:3px;
}
.dropdown-label {
  font-size:.46rem;
  letter-spacing:.18em;
  color:#c9a84c55;
  text-transform:uppercase;
  padding-left:2px;
}
#midi-out-select, #midi-in-select {
  appearance:none;
  background:#0d0b07;
  border:1px solid #c9a84c44;
  color:var(--accent);
  font-family:'Space Mono',monospace;
  font-size:.56rem;
  letter-spacing:.1em;
  padding:6px 32px 6px 12px;
  border-radius:2px;
  cursor:pointer;
  transition:border-color .2s, box-shadow .2s;
  min-width:180px;
  outline:none;
}
#midi-out-select:hover, #midi-out-select:focus,
#midi-in-select:hover, #midi-in-select:focus {
  border-color:var(--accent);
  box-shadow:0 0 14px var(--glow);
}
#midi-out-select option, #midi-in-select option {
  background:#0d0b07;
  color:var(--accent);
}
#midi-in-indicator {
  display:inline-block;
  width:6px; height:6px;
  border-radius:50%;
  background:#c9a84c22;
  border:1px solid #c9a84c44;
  margin-left:6px;
  vertical-align:middle;
  transition:background .15s, box-shadow .15s;
}
#midi-in-indicator.active {
  background:#c9a84c;
  box-shadow:0 0 8px #c9a84caa;
}
.dropdown-arrow {
  position:absolute;
  right:10px; bottom:9px;
  pointer-events:none;
  font-size:.6rem;
  color:#c9a84c88;
}

#chord-display-wrap {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: linear-gradient(180deg, #16130c 0%, #0d0b07 100%);
  border: 1px solid var(--accent);
  border-radius: 3px;
  min-width: 140px;
  height: 72px;
  padding: 0 10px;
  box-shadow: 0 0 16px var(--glow);
}
.chord-title {
  font-size: 0.45rem;
  letter-spacing: 0.15em;
  color: rgba(201, 168, 76, 0.5);
  text-transform: uppercase;
  margin-bottom: 2px;
}
#chord-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.2rem;
  font-weight: 300;
  color: var(--accent2);
  text-shadow: 0 0 10px var(--glow);
  white-space: nowrap;
  text-align: center;
}

/* Tietokoneen näppäimistön hotkey-tunnisteet koskettimilla */
.hotkey-label {
  position: absolute;
  font-weight: 700;
  color: var(--accent);
  pointer-events: none;
  text-transform: uppercase;
  font-size: 0.55rem;
  display: none;
  opacity: 0.95;
  text-shadow: 0 0 4px rgba(0,0,0,0.8);
}
.wkey .hotkey-label {
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
}
.bkey .hotkey-label {
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  color: var(--accent2);
}
.show-hotkeys .hotkey-label {
  display: block;
}

.knob-wrap {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:5px;
}
.knob-label {
  font-size:.46rem;
  letter-spacing:.18em;
  color:#c9a84c55;
  text-transform:uppercase;
}
#volume-knob {
  width:52px; height:52px;
  cursor:grab;
  touch-action:none;
}
#volume-knob:active { cursor:grabbing; }
.knob-svg { width:100%; height:100%; overflow:visible; }
#knob-val {
  font-size:.46rem;
  letter-spacing:.1em;
  color:#c9a84c66;
  text-align:center;
  min-width:40px;
}

#status {
  font-size:.55rem;
  letter-spacing:.12em;
  color:#ffffff22;
  text-transform:uppercase;
  height:14px;
  transition:color .3s;
}
#status.active { color:var(--accent); }

#progress-wrap {
  width:340px;
  height:2px;
  background:#ffffff08;
  border-radius:1px;
  overflow:hidden;
}
#progress-bar {
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#c9a84c,#e8c87a);
  box-shadow:0 0 8px var(--glow);
  transition:width .1s linear;
}

#pedals {
  display:flex; gap:14px;
  margin-top:4px;
}
.pedal {
  width:22px; height:9px;
  background:linear-gradient(180deg,#2a2010,#1a1208);
  border-radius:3px;
  border:1px solid #3a2e18;
  box-shadow:0 3px 6px #000000aa;
  cursor:pointer;
  transition:transform .1s;
}
.pedal:active { transform:scaleY(.82); }

/* TWO CANVACES: Golden Falling Notes + Original Particle Sparks */
#falling-canvas, #particle-canvas {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:20;
}
#particle-canvas { z-index:21; }
</style>
</head>
<body>

<header>
  <h1>GRAND PIANO</h1>
  <p>88-key · MIDI synced to falling stars</p>
</header>

<div id="scene">
  <div id="piano-wrap">
    <div id="piano-body">
      <div id="keys"></div>
      <div id="piano-front"></div>
      <div class="leg leg-l"></div>
      <div class="leg leg-r"></div>
    </div>
  </div>
</div>

<div id="controls">
  <div class="ctrl-row">
    <label id="upload-label" for="file-input">♩ Lataa MIDI</label>
    <input type="file" id="file-input" accept=".mid,.midi">
    <button class="btn" id="play-btn">▶ Toista</button>
    <button class="btn" id="stop-btn">■ Pysäytä</button>
    <!-- Valaistu Clef-nuottiviivastokytkin (On oletuksena) -->
    <button class="btn active-clef" id="clef-btn">𝄞 Viivasto</button>
    <!-- Opi-painike (Oletuksena pois) -->
    <button class="btn" id="learn-btn">🎓 Opi</button>
    
    <!-- Päivitetty MIDI- ja sointupaneeli -->
    <div class="midi-panel">
      <div class="dropdowns-column">
        <div class="dropdown-wrap">
          <span class="dropdown-label">MIDI In <span id="midi-in-indicator"></span></span>
          <select id="midi-in-select">
            <option value="">— Ei MIDI-tuloa —</option>
            <option value="keyboard">⌨ Tietokoneen näppäimistö</option>
          </select>
          <span class="dropdown-arrow">▾</span>
        </div>
        <div class="dropdown-wrap">
          <span class="dropdown-label">MIDI Out</span>
          <select id="midi-out-select"><option value="">— Ei MIDI-lähtöä —</option></select>
          <span class="dropdown-arrow">▾</span>
        </div>
      </div>
      <div id="chord-display-wrap">
        <span class="chord-title">Sointu</span>
        <div id="chord-name">—</div>
      </div>
    </div>

    <div class="knob-wrap">
      <span class="knob-label">Volume</span>
      <div id="volume-knob">
        <svg class="knob-svg" viewBox="0 0 52 52">
          <defs><radialGradient id="kg" cx="40%" cy="30%" r="70%"><stop offset="0%" stop-color="#3a3020"/><stop offset="100%" stop-color="#0d0b07"/></radialGradient><filter id="kglow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
          <circle cx="26" cy="26" r="23" fill="none" stroke="#3a3020" stroke-width="2.5"/>
          <path id="arc-bg" fill="none" stroke="#1a1610" stroke-width="3" stroke-linecap="round"/>
          <path id="arc-fill" fill="none" stroke="#c9a84c" stroke-width="3" stroke-linecap="round" filter="url(#kglow)"/>
          <circle cx="26" cy="26" r="17" fill="url(#kg)" stroke="#3a3020" stroke-width="1"/>
          <ellipse cx="21" cy="20" rx="6" ry="4" fill="#ffffff06" transform="rotate(-20 21 20)"/>
          <circle id="knob-dot" cx="26" cy="11" r="2.5" fill="#c9a84c" filter="url(#kglow)"/>
        </svg>
      </div>
      <div id="knob-val">75%</div>
    </div>
  </div>
  <div id="status">Lataa MIDI-tiedosto aloittaaksesi</div>
  <div id="progress-wrap"><div id="progress-bar"></div></div>
  <div id="pedals"><div class="pedal" title="Una Corda"></div><div class="pedal" title="Sostenuto"></div><div class="pedal" title="Sustain"></div></div>
</div>

<canvas id="falling-canvas"></canvas>
<canvas id="particle-canvas"></canvas>

<!-- ═══════════════════════════════════════════════════════════════
     SOINNUN TUNNISTUS (Itsenäinen moduuli ilman CORS/palvelin-ongelmia)
     ═══════════════════════════════════════════════════════════════ -->
<script>
(function(global) {
  const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  
  const chord_templates = {
    // Triadit
    "maj": [0, 4, 7],
    "min": [0, 3, 7],
    "aug": [0, 4, 8],
    "dim": [0, 3, 6],
    "sus2": [0, 2, 7],
    "sus4": [0, 5, 7],
    "5": [0, 7],
    
    // Septimisoinnut
    "maj7": [0, 4, 7, 11],
    "7": [0, 4, 7, 10],
    "min7": [0, 3, 7, 10],
    "min/maj7": [0, 3, 7, 11],
    "aug7": [0, 4, 8, 10],
    "aug/maj7": [0, 4, 8, 11],
    "dim7": [0, 3, 6, 9],
    "half-dim7": [0, 3, 6, 10],
    "7sus4": [0, 5, 7, 10],
    "7sus2": [0, 2, 7, 10],
    
    // Add-soinnut
    "add2": [0, 2, 4, 7],
    "add4": [0, 4, 5, 7],
    "add6": [0, 4, 7, 9],
    "add9": [0, 4, 7, 14],
    "add11": [0, 4, 7, 17],
    "6": [0, 4, 7, 9],
    "min6": [0, 3, 7, 9],
    "6/9": [0, 4, 7, 9, 14],
    
    // Noonisoinnut
    "maj9": [0, 4, 7, 11, 14],
    "9": [0, 4, 7, 10, 14],
    "min9": [0, 3, 7, 10, 14],
    "min/maj9": [0, 3, 7, 11, 14],
    "aug9": [0, 4, 8, 10, 14],
    "half-dim9": [0, 3, 6, 10, 14],
    "9sus4": [0, 5, 7, 10, 14],
    
    // 11-soinnut
    "maj11": [0, 4, 7, 11, 14, 17],
    "11": [0, 4, 7, 10, 14, 17],
    "min11": [0, 3, 7, 10, 14, 17],
    
    // 13-soinnut
    "maj13": [0, 4, 7, 11, 14, 17, 21],
    "13": [0, 4, 7, 10, 14, 17, 21],
    "min13": [0, 3, 7, 10, 14, 17, 21],
    
    // Erikoissoinnut
    "7#5": [0, 4, 8, 10],
    "7b5": [0, 4, 6, 10],
    "maj7#5": [0, 4, 8, 11],
    "maj7b5": [0, 4, 6, 11],
    "7#9": [0, 4, 7, 10, 15],
    "7b9": [0, 4, 7, 10, 13],
    "7#11": [0, 4, 7, 10, 18],
    "7b13": [0, 4, 7, 10, 20],
  };

  const processedChords = [];
  for (const [name, intervals] of Object.entries(chord_templates)) {
    const pcs = Array.from(new Set(intervals.map(i => i % 12))).sort((a,b)=>a-b);
    processedChords.push({ name, pcs, size: intervals.length });

    const isExtended = /[79]|11|13|6/.test(name);
    if (isExtended && pcs.includes(7)) {
      const no5pcs = pcs.filter(x => x !== 7);
      processedChords.push({ name: name + " (no 5th)", pcs: no5pcs, size: intervals.length - 1 });
    }
  }

  processedChords.sort((a, b) => b.size - a.size);

  function arraysEqual(a, b) {
    if (a.length !== b.length) return false;
    for (let i = 0; i < a.length; i++) {
      if (a[i] !== b[i]) return false;
    }
    return true;
  }

  global.ChordDetector = {
    detect: function(midiNotes) {
      if (!midiNotes || midiNotes.length === 0) return "—";
      const sortedMidi = [...midiNotes].sort((a,b) => a - b);
      const bassMidi = sortedMidi[0];
      const bassNoteName = NOTE_NAMES[bassMidi % 12];
      const uniquePCs = Array.from(new Set(sortedMidi.map(m => m % 12)));

      const matches = [];

      for (let r = 0; r < 12; r++) {
        const relPCs = Array.from(new Set(uniquePCs.map(pc => (pc - r + 12) % 12))).sort((a,b)=>a-b);
        for (const chord of processedChords) {
          if (arraysEqual(relPCs, chord.pcs)) {
            matches.push({
              root: r,
              rootName: NOTE_NAMES[r],
              chordName: chord.name,
              size: chord.size,
              bassName: bassNoteName,
              isInversion: r !== (bassMidi % 12)
            });
          }
        }
      }

      if (matches.length === 0) return "Tuntematon";
      
      matches.sort((a, b) => b.size - a.size);
      const best = matches[0];
      
      let displayStr = `${best.rootName}${best.chordName}`;
      if (best.isInversion) {
        displayStr += `/${best.bassName}`;
      }
      return displayStr;
    }
  };
})(window);
</script>

<script>
// ═══════════════════════════════════════════════════════════════
// ALUSTUS & GLOBAALIT MUUTTUJAT (ESTETÄÄN INITIALIZATION-VIRHEET)
// ═══════════════════════════════════════════════════════════════
let clefMode = true; 
let learnMode = false;
let learnSteps = [];
let learnIndex = 0;
let slideOffset = 0;

// ═══════════════════════════════════════════════════════════════
// 88-KEY PIANO LAYOUT
// ═══════════════════════════════════════════════════════════════
const keysContainer = document.getElementById('keys');
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const BLACK_SET = new Set(['C#','D#','F#','G#','A#']);
const WHITE_KEYS = [];
let whiteCount = 0;
for (let midi = 21; midi <= 108; midi++) {
  const note = NOTE_NAMES[midi % 12];
  if (!BLACK_SET.has(note)) WHITE_KEYS.push({ midi, note, whiteIndex: whiteCount++ });
}
const KEY_W = 20, KEY_GAP = 1.4, KEY_STEP = KEY_W + KEY_GAP;
WHITE_KEYS.forEach(k => {
  const el = document.createElement('div'); el.className = 'wkey'; el.dataset.midi = k.midi;
  const label = document.createElement('span'); label.className = 'note-label';
  if (k.note === 'C') label.textContent = 'C' + Math.floor((k.midi - 12) / 12);
  el.appendChild(label); keysContainer.appendChild(el);
});
for (let midi = 21; midi <= 108; midi++) {
  const note = NOTE_NAMES[midi % 12];
  if (!BLACK_SET.has(note)) continue;
  let prevWhiteIdx = -1;
  for (let m = midi - 1; m >= 21; m--) {
    if (!BLACK_SET.has(NOTE_NAMES[m % 12])) {
      const wk = WHITE_KEYS.find(w => w.midi === m);
      if (wk) { prevWhiteIdx = wk.whiteIndex; break; }
    }
  }
  if (prevWhiteIdx < 0) continue;
  const el = document.createElement('div'); el.className = 'bkey'; el.dataset.midi = midi;
  el.style.left = (prevWhiteIdx * KEY_STEP + KEY_W - 6.5) + 'px';
  keysContainer.appendChild(el);
}
keysContainer.style.width = (whiteCount * KEY_STEP - KEY_GAP) + 'px';

document.querySelectorAll('.wkey, .bkey').forEach(el => {
  const lbl = document.createElement('span');
  lbl.className = 'hotkey-label';
  el.appendChild(lbl);
});

// ═══════════════════════════════════════════════════════════════
// ORIGINAL PARTICLE EFFECT (Sparkles on key hit)
// ═══════════════════════════════════════════════════════════════
const particleCanvas = document.getElementById('particle-canvas');
let pCtx = particleCanvas.getContext('2d');
let particles = [];
function resizeParticleCanvas() { particleCanvas.width = innerWidth; particleCanvas.height = innerHeight; }
resizeParticleCanvas(); window.addEventListener('resize', resizeParticleCanvas);

function spawnParticleAt(x, y) {
  for (let i = 0; i < 14; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 3.2,
      vy: -Math.random() * 5 - 1.5,
      life: 1, decay: Math.random() * 0.02 + 0.014,
      size: Math.random() * 3 + 1.2,
      hue: Math.random() > 0.4 ? '#c9a84c' : '#ffdd99'
    });
  }
}

function animateParticles() {
  pCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.life -= p.decay;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size * (0.5 + p.life * 0.5), 0, Math.PI * 2);
    pCtx.fillStyle = p.hue + Math.floor(p.life * 200).toString(16).padStart(2, '0');
    pCtx.fill();
  }
  requestAnimationFrame(animateParticles);
}
animateParticles();

// ═══════════════════════════════════════════════════════════════
// VIIVASTOMALLIN MUUNNOS JA VISUALISOINTI (CLEF MODE)
// ═══════════════════════════════════════════════════════════════
const clefBtn = document.getElementById('clef-btn');

clefBtn.addEventListener('click', () => {
  clefMode = !clefMode;
  clefBtn.classList.toggle('active-clef', clefMode);
  
  if (learnMode && !clefMode) {
    // Suljetaan Opi-tila jos viivasto otetaan väkisin pois
    toggleLearnMode(false);
  }
  
  fallingNotes = []; // tyhjennetään nykyiset nuotit häiriöiden välttämiseksi
  if (clefMode) {
    setStatus('Nuottiviivastotila aktivoitu', true);
  } else {
    setStatus('Tähtisadepudotus aktivoitu', true);
  }
});

// Muuntaa MIDI-koskettimen nuottiviivaston Y-koordinaatiksi
// Keski-C (MIDI 60) on viivastojen keskellä (step = 0)
function midiToStaffY(midi) {
  const centerY = window.innerHeight * 0.32; // Sijoitus ruudun yläpuoliskoon
  const lineSpacing = 11;
  const stepHeight = lineSpacing / 2;

  // Diatoninen siirtymä suhteessa C4 (MIDI 60)
  const midiToDiatonic = [0, 0, 1, 1, 2, 3, 3, 4, 4, 5, 5, 6];
  const octave = Math.floor(midi / 12) - 5;
  const noteInOctave = midi % 12;
  const step = octave * 7 + midiToDiatonic[noteInOctave];

  return centerY - step * stepHeight;
}

function drawGrandStaff() {
  const centerY = window.innerHeight * 0.32;
  const lineSpacing = 11;
  const stepHeight = lineSpacing / 2;
  const startX = 60;
  const endX = window.innerWidth - 60;

  fCtx.save();
  fCtx.strokeStyle = 'rgba(201, 168, 76, 0.22)';
  fCtx.lineWidth = 1;

  // Diskanttiavain viivat (asemat 2, 4, 6, 8, 10 diatonisesti)
  for (let i = 2; i <= 10; i += 2) {
    const y = centerY - i * stepHeight;
    fCtx.beginPath(); fCtx.moveTo(startX, y); fCtx.lineTo(endX, y); fCtx.stroke();
  }

  // Bassoavain viivat (asemat -2, -4, -6, -8, -10 diatonisesti)
  for (let i = 2; i <= 10; i += 2) {
    const y = centerY + i * stepHeight;
    fCtx.beginPath(); fCtx.moveTo(startX, y); fCtx.lineTo(endX, y); fCtx.stroke();
  }

  // Pystysuorat viivat sulkemaan viivastot
  fCtx.strokeStyle = 'rgba(201, 168, 76, 0.4)';
  fCtx.lineWidth = 1.5;
  const tY = centerY - 10 * stepHeight;
  const bY = centerY + 10 * stepHeight;
  fCtx.beginPath(); fCtx.moveTo(startX, tY); fCtx.lineTo(startX, bY); fCtx.stroke();
  fCtx.beginPath(); fCtx.moveTo(endX, tY); fCtx.lineTo(endX, bY); fCtx.stroke();

  // Akoladi (sulku) vasemmassa reunassa
  fCtx.font = '54px serif';
  fCtx.fillStyle = 'rgba(201, 168, 76, 0.7)';
  fCtx.textAlign = 'right';
  fCtx.textBaseline = 'middle';
  fCtx.fillText('{', startX - 8, centerY);

  // G- ja F-avaimien symbolit piirrettynä tyylikkäästi
  fCtx.textAlign = 'left';
  fCtx.font = '38px serif';
  fCtx.fillText('𝄞', startX + 10, centerY - 4 * stepHeight + 11); // Diskantti G4-viivalla
  fCtx.fillText('𝄢', startX + 10, centerY + 4 * stepHeight + 6);  // Basso F3-viivalla

  // 1/3 kohdassa oleva pystyviiva (Trigger Line)
  const triggerX = window.innerWidth / 3;
  fCtx.strokeStyle = 'rgba(201, 168, 76, 0.55)';
  fCtx.lineWidth = 1.5;
  fCtx.setLineDash([4, 4]);
  fCtx.beginPath();
  fCtx.moveTo(triggerX, tY - 15);
  fCtx.lineTo(triggerX, bY + 15);
  fCtx.stroke();
  fCtx.setLineDash([]); // nollaus

  // Korostusalue trigger-viivan ympärillä
  fCtx.fillStyle = 'rgba(201, 168, 76, 0.04)';
  fCtx.fillRect(triggerX - 10, tY - 10, 20, (bY - tY) + 20);

  fCtx.restore();
}

// Spawnaa käyttäjän oman soittaman nuotin viivastolle (syaanin värinen)
function spawnUserNote(midi) {
  if (!clefMode) return;
  const triggerX = window.innerWidth / 3;
  const slideDuration = 2000;
  const speed = (window.innerWidth - triggerX) / (slideDuration / (1000/60));

  fallingNotes.push({
    x: triggerX,
    y: midiToStaffY(midi),
    targetKey: midi,
    radius: 6,
    alpha: 1,
    hit: true, // jo lauennut, valuu vain ohi
    speed: speed,
    isUserNote: true,
    trail: [],
    tailLength: 35
  });
}

// ═══════════════════════════════════════════════════════════════
// GOLDEN FALLING NOTES (top to key) - with hit callback
// ═══════════════════════════════════════════════════════════════
const fallCanvas = document.getElementById('falling-canvas');
let fCtx = fallCanvas.getContext('2d');
let fallingNotes = [];
let keyRects = new Map();

function updateKeyRects() {
  keyRects.clear();
  document.querySelectorAll('.wkey, .bkey').forEach(el => {
    const midi = parseInt(el.dataset.midi);
    const rect = el.getBoundingClientRect();
    if (rect.width > 0) keyRects.set(midi, rect);
  });
}

function spawnGoldenNoteWithCallback(midi, onHitCallback, noteDurationMs) {
  const rect = keyRects.get(midi);
  const startY = 5;
  const targetY = rect ? (rect.top + rect.height * 0.55) : window.innerHeight * 0.65;

  let noteObj;
  if (clefMode) {
    const triggerX = window.innerWidth / 3;
    const startX = window.innerWidth;
    const slideDuration = 2000; // ms nuotin matka oikealta 1/3-linjalle
    const speed = (startX - triggerX) / (slideDuration / (1000/60));

    noteObj = {
      x: startX,
      y: midiToStaffY(midi),
      targetKey: midi,
      radius: 6,
      alpha: 1,
      hit: false,
      speed: speed,
      onHit: onHitCallback,
      isUserNote: false,
      trail: [],
      tailLength: noteDurationMs ? Math.max(20, Math.min(150, noteDurationMs * 0.08)) : 40
    };
  } else {
    if (!rect) return null;
    const dist = targetY - startY;
    const speed = dist / (STAR_FALL_DURATION / (1000/60));
    noteObj = {
      x: rect.left + rect.width/2,
      y: startY,
      targetKey: midi,
      radius: 8,
      alpha: 1,
      hit: false,
      speed: Math.max(1.2, speed),
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: 0.025 + Math.random()*0.02,
      onHit: onHitCallback,
      isUserNote: false,
      tailLength: noteDurationMs ? Math.max(30, Math.min(300, noteDurationMs * 0.18)) : 60,
      trail: []
    };
  }
  fallingNotes.push(noteObj);
  return noteObj;
}

function updateFallingNotes() {
  const triggerX = window.innerWidth / 3;
  for (let i = 0; i < fallingNotes.length; i++) {
    const n = fallingNotes[i];

    // 1. Käyttäjän itse soittamat nuotit (Syaani väri - liukuu suoraan vasemmalle)
    if (n.isUserNote) {
      n.x -= n.speed;
      n.trail.push({x: n.x, y: n.y});
      if (n.trail.length > n.tailLength) n.trail.shift();
      if (n.x < 50) {
        n.alpha -= 0.05;
        if (n.alpha <= 0 || n.x < -30) { fallingNotes.splice(i,1); i--; }
      }
      continue;
    }

    // 2. Ohjelman soittamat nuotit
    if (n.hit) {
      if (clefMode) {
        // Jatkaa liukumista vasempaan reunaan vaikka on jo soinnutettu viivalla
        n.x -= n.speed;
        n.trail.push({x: n.x, y: n.y});
        if (n.trail.length > n.tailLength) n.trail.shift();
        n.alpha -= 0.02; // Hidas tyylikäs häipyminen
        if (n.alpha <= 0 || n.x < -30) { fallingNotes.splice(i,1); i--; }
      } else {
        // Alkuperäinen pystysuora tähtihäipyminen
        n.alpha -= 0.045; n.radius += 0.4;
        if (n.trail.length > 0) n.trail.shift();
        if (n.alpha <= 0) { fallingNotes.splice(i,1); i--; }
      }
      continue;
    }

    // Liikuta aktiivisia nuotteja kohti osumaa
    if (clefMode) {
      n.x -= n.speed;
      n.trail.push({x: n.x, y: n.y});
      if (n.trail.length > n.tailLength) n.trail.shift();

      if (n.x <= triggerX) {
        n.hit = true;
        n.impactX = triggerX;
        n.impactY = n.y;
        if (n.onHit) n.onHit(n.targetKey);

        const curRect = keyRects.get(n.targetKey);
        if (curRect) spawnParticleAt(curRect.left + curRect.width/2, curRect.top + 5);
        else spawnParticleAt(triggerX, n.y);
      }
    } else {
      // Alkuperäinen pystytippumis-logiikka
      n.y += n.speed; n.rotation += n.rotSpeed;
      n.trail.push({x: n.x, y: n.y});
      const maxTrail = Math.ceil(n.tailLength);
      if (n.trail.length > maxTrail) n.trail.shift();

      const curRect = keyRects.get(n.targetKey);
      if (curRect && n.y >= curRect.top + curRect.height * 0.55) {
        n.hit = true;
        n.impactX = curRect.left + curRect.width/2;
        n.impactY = curRect.top + 5;
        if (n.onHit) n.onHit(n.targetKey);
        spawnParticleAt(curRect.left + curRect.width/2, curRect.top + 5);
      }
    }

    if (n.y > window.innerHeight + 80 || n.x < -50) { fallingNotes.splice(i,1); i--; }
  }
}

function drawFallingNotes() {
  fCtx.clearRect(0, 0, fallCanvas.width, fallCanvas.height);
  
  if (clefMode) {
    drawGrandStaff();
  }

  // Jos ollaan Opi-tilassa ja viivasto on näkyvissä, piirretään seuraavat soitettavat nuotit
  if (learnMode && clefMode) {
    slideOffset += (0 - slideOffset) * 0.15; // Pehmeä siirtymäanimaatio askeleesta toiseen
    const triggerX = window.innerWidth / 3;
    const stepWidth = 80;
    
    // Piirretään nykyinen ja seuraavat 5 askelta
    const startIdx = learnIndex;
    const endIdx = Math.min(learnSteps.length, learnIndex + 6);

    for (let i = startIdx; i < endIdx; i++) {
      const step = learnSteps[i];
      const x = triggerX + (i - learnIndex) * stepWidth + slideOffset;

      if (x < 50 || x > window.innerWidth - 30) continue;
      const isCurrent = (i === learnIndex);

      step.notes.forEach(midi => {
        const y = midiToStaffY(midi);
        const isHit = step.hitMap[midi];

        let alpha = 1;
        if (!isCurrent) {
          alpha = 0.5 - (i - learnIndex) * 0.07;
        }
        alpha = Math.max(0.15, alpha);

        const headColor = isHit 
          ? `rgba(0, 245, 212, ${alpha})` // Syaani soitetuille nuoteille
          : (isCurrent ? `rgba(245, 215, 66, ${alpha})` : `rgba(201, 168, 76, ${alpha})`);

        const strokeColor = isHit 
          ? `rgba(0, 245, 212, ${alpha * 0.5})` 
          : `rgba(201, 168, 76, ${alpha * 0.5})`;

        const glowColor = isHit ? '#00f5d4' : '#c9a84c';

        fCtx.save();
        if (isCurrent && !isHit) {
          // Hehkuva pulssi soittamattomille nykyisille nuoteille
          const pulse = 1 + 0.1 * Math.sin(performance.now() * 0.008);
          fCtx.shadowBlur = 12 * pulse;
          fCtx.shadowColor = '#f5d742';
        } else {
          fCtx.shadowBlur = 4;
          fCtx.shadowColor = glowColor;
        }

        // Piirretään apuviivat
        const lineSpacing = 11;
        const stepHeight = lineSpacing / 2;
        const midiToDiatonic = [0, 0, 1, 1, 2, 3, 3, 4, 4, 5, 5, 6];
        const octave = Math.floor(midi / 12) - 5;
        const noteInOctave = midi % 12;
        const dStep = octave * 7 + midiToDiatonic[noteInOctave];

        const isLedger = (dStep === 0 || (dStep >= 12 && dStep % 2 === 0) || (dStep <= -12 && dStep % 2 === 0));
        if (isLedger) {
          fCtx.beginPath();
          fCtx.moveTo(x - 10, y);
          fCtx.lineTo(x + 10, y);
          fCtx.strokeStyle = isHit ? `rgba(0, 245, 212, ${alpha * 0.8})` : `rgba(201, 168, 76, ${alpha * 0.8})`;
          fCtx.lineWidth = 1.5;
          fCtx.stroke();
        }

        // Korotukset
        const noteName = NOTE_NAMES[midi % 12];
        if (BLACK_SET.has(noteName)) {
          fCtx.font = '12px serif';
          fCtx.fillStyle = headColor;
          fCtx.fillText('♯', x - 13, y + 4.5);
        }

        // Kallistettu nuotin pää
        fCtx.translate(x, y);
        fCtx.rotate(-Math.PI / 7);
        fCtx.beginPath();
        fCtx.ellipse(0, 0, 5.8, 4.1, 0, 0, Math.PI * 2);
        fCtx.fillStyle = headColor;
        fCtx.fill();
        fCtx.restore();
      });
    }

    // Piirretään käyttäjän soittamat ja ohi liukuvat syaanin väriset nuotit Opi-tilassa
    for (const n of fallingNotes) {
      if (n.isUserNote) {
        fCtx.save();
        fCtx.shadowBlur = 5; fCtx.shadowColor = '#00f5d4';
        if (n.trail && n.trail.length > 1) {
          fCtx.beginPath();
          fCtx.moveTo(n.trail[0].x, n.trail[0].y);
          for (let t = 1; t < n.trail.length; t++) {
            fCtx.lineTo(n.trail[t].x, n.trail[t].y);
          }
          fCtx.strokeStyle = `rgba(0, 245, 212, ${n.alpha * 0.5})`;
          fCtx.lineWidth = 3.5;
          fCtx.stroke();
        }
        fCtx.translate(n.x, n.y);
        fCtx.rotate(-Math.PI / 7);
        fCtx.beginPath();
        fCtx.ellipse(0, 0, 5.8, 4.1, 0, 0, Math.PI * 2);
        fCtx.fillStyle = `rgba(0, 245, 212, ${n.alpha})`;
        fCtx.fill();
        fCtx.restore();
      }
    }

  } else {
    // Alkuperäinen putoavien tähtien ja nuottien piirto
    for (const n of fallingNotes) {
      const isSyaani = n.isUserNote;
      const strokeColor = isSyaani ? `rgba(0, 245, 212, ${n.alpha * 0.5})` : `rgba(255, 210, 80, ${n.alpha * 0.5})`;
      const headColor = isSyaani ? `rgba(0, 245, 212, ${n.alpha})` : `rgba(245, 215, 66, ${n.alpha})`;
      const glowColor = isSyaani ? '#00f5d4' : '#c9a84c';

      if (clefMode) {
        fCtx.save();
        fCtx.shadowBlur = n.hit ? 15 : 5;
        fCtx.shadowColor = glowColor;

        // Piirretään tyylikäs liukuhäntä
        if (n.trail && n.trail.length > 1) {
          fCtx.beginPath();
          fCtx.moveTo(n.trail[0].x, n.trail[0].y);
          for (let t = 1; t < n.trail.length; t++) {
            fCtx.lineTo(n.trail[t].x, n.trail[t].y);
          }
          fCtx.strokeStyle = strokeColor;
          fCtx.lineWidth = isSyaani ? 3.5 : 2.5;
          fCtx.stroke();
        }

        // Piirretään apuviivat nuoteille jotka tarvitsevat niitä (kuten keski-C)
        const lineSpacing = 11;
        const stepHeight = lineSpacing / 2;
        const midiToDiatonic = [0, 0, 1, 1, 2, 3, 3, 4, 4, 5, 5, 6];
        const octave = Math.floor(n.targetKey / 12) - 5;
        const noteInOctave = n.targetKey % 12;
        const step = octave * 7 + midiToDiatonic[noteInOctave];

        // Keski-C (step = 0) ja ylä/alapuoliset lisäviivat
        const isLedger = (step === 0 || (step >= 12 && step % 2 === 0) || (step <= -12 && step % 2 === 0));
        if (isLedger) {
          fCtx.beginPath();
          fCtx.moveTo(n.x - 10, n.y);
          fCtx.lineTo(n.x + 10, n.y);
          fCtx.strokeStyle = isSyaani ? `rgba(0, 245, 212, ${n.alpha * 0.8})` : `rgba(201, 168, 76, ${n.alpha * 0.8})`;
          fCtx.lineWidth = 1.5;
          fCtx.stroke();
        }

        // Etumerkki (korotusmerkki ♯) mustille koskettimille
        const noteName = NOTE_NAMES[n.targetKey % 12];
        if (BLACK_SET.has(noteName)) {
          fCtx.font = '12px serif';
          fCtx.fillStyle = headColor;
          fCtx.fillText('♯', n.x - 13, n.y + 4.5);
        }

        // Ellipsin muotoinen tyylikäs nuotin pää (kallistettu)
        fCtx.translate(n.x, n.y);
        fCtx.rotate(-Math.PI / 7);
        fCtx.beginPath();
        fCtx.ellipse(0, 0, 5.8, 4.1, 0, 0, Math.PI * 2);
        fCtx.fillStyle = headColor;
        fCtx.fill();

        fCtx.restore();

        // Osuman laajeneva ympyrä trigger-viivalla
        if (n.hit && n.alpha > 0.4 && !isSyaani) {
          fCtx.save();
          fCtx.shadowBlur = 12; fCtx.shadowColor = '#f5d742';
          fCtx.beginPath();
          fCtx.arc(n.impactX, n.impactY, 13 * (1.6 - n.alpha), 0, Math.PI * 2);
          fCtx.strokeStyle = `rgba(255, 230, 110, ${(n.alpha - 0.4) * 1.6})`;
          fCtx.lineWidth = 1.2;
          fCtx.stroke();
          fCtx.restore();
        }
      } else {
        // ALKUPERÄINEN pystytippumis-piirto
        if (n.hit) {
          if (n.trail && n.trail.length > 1) {
            for (let t = 0; t < n.trail.length - 1; t++) {
              const p0 = n.trail[t], p1 = n.trail[t+1];
              const frac = t / n.trail.length;
              const tailAlpha = frac * n.alpha * 0.7;
              fCtx.beginPath();
              fCtx.moveTo(p0.x, p0.y); fCtx.lineTo(p1.x, p1.y);
              fCtx.strokeStyle = `rgba(255,210,80,${tailAlpha})`;
              fCtx.lineWidth = 1.5 + frac * 3;
              fCtx.shadowBlur = 8; fCtx.shadowColor = '#c9a84c';
              fCtx.stroke();
            }
          }
          const ix = n.impactX || n.x, iy = n.impactY || n.y;
          fCtx.save();
          fCtx.shadowBlur = 28 * n.alpha; fCtx.shadowColor = '#ffe066';
          fCtx.beginPath(); fCtx.arc(ix, iy, n.radius * (1 - n.alpha*0.3), 0, Math.PI*2);
          fCtx.fillStyle = `rgba(255, 200, 80, ${n.alpha * 0.85})`; fCtx.fill();
          if (n.alpha > 0.3) {
            const ringR = n.radius * (2.5 - n.alpha);
            fCtx.beginPath(); fCtx.arc(ix, iy, ringR, 0, Math.PI*2);
            fCtx.strokeStyle = `rgba(255,240,140,${n.alpha * 0.6})`; 
            fCtx.lineWidth = 1.5; fCtx.stroke();
            for (let s = 0; s < 8; s++) {
              const ang = (Math.PI * 2 / 8) * s + (1-n.alpha) * 0.5;
              const r1 = n.radius * 1.2, r2 = ringR * 1.3 * (1 - n.alpha * 0.4);
              fCtx.beginPath();
              fCtx.moveTo(ix + Math.cos(ang)*r1, iy + Math.sin(ang)*r1);
              fCtx.lineTo(ix + Math.cos(ang)*r2, iy + Math.sin(ang)*r2);
              fCtx.strokeStyle = `rgba(255,230,100,${n.alpha * 0.55})`;
              fCtx.lineWidth = 1; fCtx.stroke();
            }
          }
          fCtx.restore();
        } else {
          fCtx.save();
          if (n.trail && n.trail.length > 1) {
            for (let t = 0; t < n.trail.length - 1; t++) {
              const p0 = n.trail[t], p1 = n.trail[t+1];
              const frac = t / n.trail.length;
              const tailAlpha = frac * 0.75;
              const w = 1.2 + frac * 4;
              fCtx.beginPath();
              fCtx.moveTo(p0.x, p0.y); fCtx.lineTo(p1.x, p1.y);
              fCtx.strokeStyle = `rgba(255,210,80,${tailAlpha})`;
              fCtx.lineWidth = w;
              fCtx.shadowBlur = 8 * frac; fCtx.shadowColor = '#c9a84c88';
              fCtx.stroke();
            }
            const tp = n.trail[n.trail.length-1];
            fCtx.beginPath();
            fCtx.moveTo(tp.x, tp.y); fCtx.lineTo(n.x, n.y);
            fCtx.strokeStyle = 'rgba(255,245,180,0.9)';
            fCtx.lineWidth = 2.5;
            fCtx.shadowBlur = 14; fCtx.shadowColor = '#ffe080';
            fCtx.stroke();
          }
          fCtx.restore();
          fCtx.save(); fCtx.shadowBlur = 16; fCtx.shadowColor = '#c9a84c';
          fCtx.translate(n.x, n.y); fCtx.rotate(n.rotation);
          fCtx.beginPath();
          for (let i=0;i<10;i++) {
            let rad = i%2===0 ? n.radius : n.radius*0.45;
            let ang = (Math.PI*2/10)*i;
            let xp = Math.cos(ang)*rad, yp = Math.sin(ang)*rad;
            if(i===0) fCtx.moveTo(xp,yp); else fCtx.lineTo(xp,yp);
          }
          fCtx.closePath();
          fCtx.fillStyle = '#f5d742'; fCtx.fill();
          fCtx.beginPath(); fCtx.arc(0,0,n.radius*0.45,0,Math.PI*2);
          fCtx.fillStyle = '#ffecb0'; fCtx.fill();
          fCtx.restore();
        }
      }
    }
  }
}

const activeChordNotes = new Set();

function trackActiveNote(midi) {
  activeChordNotes.add(midi);
  updateChordDisplay();
}

function untrackActiveNote(midi) {
  activeChordNotes.delete(midi);
  updateChordDisplay();
}

function updateChordDisplay() {
  const chordNameEl = document.getElementById('chord-name');
  if (activeChordNotes.size === 0) {
    chordNameEl.textContent = '—';
    return;
  }
  const arr = Array.from(activeChordNotes);
  chordNameEl.textContent = window.ChordDetector.detect(arr);
}

// KEY VISUAL + AUDIO + MIDI OUT (for manual play)
// ═══════════════════════════════════════════════════════════════
function pressKeyVisual(midi) {
  const el = document.querySelector(`[data-midi="${midi}"]`);
  if (el) el.classList.add('active');
}
function releaseKeyVisual(midi) {
  const el = document.querySelector(`[data-midi="${midi}"]`);
  if (el) el.classList.remove('active');
}

function userPlayedNoteOn(midi, vel = 100) {
  if (learnMode && learnSteps.length > 0) {
    const currentStep = learnSteps[learnIndex];
    if (currentStep && currentStep.notes.includes(midi)) {
      if (!currentStep.hitMap[midi]) {
        currentStep.hitMap[midi] = true;

        playTone(midi, vel);
        pressKeyVisual(midi);
        trackActiveNote(midi);
        sendMidiNote(midi, vel);
        spawnUserNote(midi);

        // Katso onko askel valmis
        const stepDone = currentStep.notes.every(n => currentStep.hitMap[n]);
        if (stepDone) {
          currentStep.completed = true;
          if (learnIndex < learnSteps.length - 1) {
            learnIndex++;
            slideOffset += 80; // Liukuaskeleen alustus oikealle
            setStatus(`Opi-tila: ${learnIndex + 1} / ${learnSteps.length}`, true);
          } else {
            setStatus('🎉 Onnittelut! Soitit koko kappaleen loppuun!', true);
          }
        }
      }
      return; // Estetään soittimen tuplakäynnistys
    }
  }

  // Normaalitila (tai virheellinen kosketin Opi-tilassa, jolloin se soi vapaasti)
  playTone(midi, vel);
  pressKeyVisual(midi);
  trackActiveNote(midi);
  sendMidiNote(midi, vel);

  if (clefMode) {
    spawnUserNote(midi);
  } else {
    spawnGoldenNoteWithCallback(midi, (m) => {
      spawnParticleAtFromMidi(m);
    }, 600);
  }
}

function userPlayedNoteOff(midi) {
  releaseKeyVisual(midi);
  sendMidiNoteOff(midi);
  untrackActiveNote(midi);
}

function playManualNote(midi, vel=100) {
  userPlayedNoteOn(midi, vel);
  setTimeout(() => { 
    userPlayedNoteOff(midi);
  }, 600);
}

function spawnParticleAtFromMidi(midi) {
  const rect = keyRects.get(midi);
  if (rect) spawnParticleAt(rect.left + rect.width/2, rect.top + 5);
}

document.querySelectorAll('.wkey, .bkey').forEach(el => {
  const midi = +el.dataset.midi;
  el.addEventListener('mousedown', () => { playManualNote(midi, 100); });
  el.addEventListener('touchstart', e => { e.preventDefault(); playManualNote(midi, 100); }, {passive:false});
});

// Webaudio: Lisätty LPF, HPF ja Compressor peak limiteriksi
let audioCtx = null, masterGain = null, volumeLevel = 0.75;
let lpfFilter = null, hpfFilter = null, peakLimiter = null;

function getAudioCtx() { 
  if (!audioCtx) { 
    audioCtx = new (window.AudioContext||window.webkitAudioContext)(); 
    masterGain = audioCtx.createGain(); 
    masterGain.gain.setValueAtTime(volumeLevel, audioCtx.currentTime); 
    
    // Alipäästösuodin (Warm LPF)
    lpfFilter = audioCtx.createBiquadFilter();
    lpfFilter.type = 'lowpass';
    lpfFilter.frequency.setValueAtTime(14000, audioCtx.currentTime);
    lpfFilter.Q.setValueAtTime(1, audioCtx.currentTime);
    
    // Ylipäästösuodin (HPF) bassomutakomponenttien poistamiseen
    hpfFilter = audioCtx.createBiquadFilter();
    hpfFilter.type = 'highpass';
    hpfFilter.frequency.setValueAtTime(25, audioCtx.currentTime);
    
    // Peak-estorajain (Limiter-kompressori)
    peakLimiter = audioCtx.createDynamicsCompressor();
    peakLimiter.threshold.setValueAtTime(-1.0, audioCtx.currentTime);
    peakLimiter.knee.setValueAtTime(0, audioCtx.currentTime);
    peakLimiter.ratio.setValueAtTime(12.0, audioCtx.currentTime);
    peakLimiter.attack.setValueAtTime(0.003, audioCtx.currentTime);
    peakLimiter.release.setValueAtTime(0.08, audioCtx.currentTime);
    
    // Kytkentäketju
    masterGain.connect(lpfFilter);
    lpfFilter.connect(hpfFilter);
    hpfFilter.connect(peakLimiter);
    peakLimiter.connect(audioCtx.destination);
  } 
  return audioCtx; 
}

function setVolume(v) { 
  volumeLevel = Math.max(0, Math.min(1, v)); 
  if(masterGain) masterGain.gain.setValueAtTime(volumeLevel, audioCtx.currentTime); 
}

function playTone(midi, vel=100, dur=0.65) {
  const ctx = getAudioCtx(); const freq = 440 * Math.pow(2, (midi-69)/12);
  const osc1=ctx.createOscillator(), osc2=ctx.createOscillator(), gain=ctx.createGain(), gain2=ctx.createGain();
  osc1.type='triangle'; osc2.type='sine';
  osc1.frequency.setValueAtTime(freq,ctx.currentTime); osc2.frequency.setValueAtTime(freq*2.004,ctx.currentTime);
  const v = vel/127*0.3;
  gain.gain.setValueAtTime(v,ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
  gain2.gain.setValueAtTime(v*0.28,ctx.currentTime); gain2.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur*0.6);
  osc1.connect(gain); gain.connect(masterGain||ctx.destination);
  osc2.connect(gain2); gain2.connect(masterGain||ctx.destination);
  osc1.start(); osc1.stop(ctx.currentTime+dur+0.1); osc2.start(); osc2.stop(ctx.currentTime+dur*0.6+0.08);
}

// ═══════════════════════════════════════════════════════════════
// VOLUME KNOB - FULL 270° RANGE
// ═══════════════════════════════════════════════════════════════
(function() {
  const knob = document.getElementById('volume-knob');
  const dot = document.getElementById('knob-dot');
  const arcFill = document.getElementById('arc-fill');
  const arcBg = document.getElementById('arc-bg');
  const valEl = document.getElementById('knob-val');

  const CX = 26, CY = 26, R = 19;
  const START_DEG = 225, TOTAL_DEG = 270, MAX_DEG = START_DEG + TOTAL_DEG;
  function polarToXY(deg) { const r=(deg-90)*Math.PI/180; return { x:CX+R*Math.cos(r), y:CY+R*Math.sin(r) }; }
  function arcPath(s,e) { const a=polarToXY(s), b=polarToXY(e); return `M${a.x.toFixed(2)},${a.y.toFixed(2)} A${R},${R} 0 ${(e-s)>180?1:0} 1 ${b.x.toFixed(2)},${b.y.toFixed(2)}`; }
  function render(v) { const deg=START_DEG+v*TOTAL_DEG; arcBg.setAttribute('d',arcPath(START_DEG,MAX_DEG)); if(v>0.005) arcFill.setAttribute('d',arcPath(START_DEG,deg)); else arcFill.setAttribute('d',''); const d=polarToXY(deg); dot.setAttribute('cx',d.x.toFixed(2)); dot.setAttribute('cy',d.y.toFixed(2)); valEl.textContent=Math.round(v*100)+'%'; }
  render(volumeLevel);
  let drag=false,startY=0,startV=0;
  knob.addEventListener('mousedown',e=>{drag=true;startY=e.clientY;startV=volumeLevel;e.preventDefault();});
  window.addEventListener('mousemove',e=>{if(!drag)return;let v=Math.min(1,Math.max(0,startV+(startY-e.clientY)/30));setVolume(v);render(v);});
  window.addEventListener('mouseup',()=>drag=false);
  knob.addEventListener('touchstart',e=>{drag=true;startY=e.touches[0].clientY;startV=volumeLevel;e.preventDefault();},{passive:false});
  window.addEventListener('touchmove',e=>{if(!drag)return;let v=Math.min(1,Math.max(0,startV+(startY-e.touches[0].clientY)/30));setVolume(v);render(v);});
  window.addEventListener('touchend',()=>drag=false);
  knob.addEventListener('wheel',e=>{e.preventDefault();let v=Math.min(1,Math.max(0,volumeLevel-e.deltaY/400));setVolume(v);render(v);},{passive:false});
})();

// ═══════════════════════════════════════════════════════════════
// TIETOKONEEN NÄPPÄIMISTÖLLÄ SOITTAMINEN & HOTKEYS-LOGIIKKA
// ═══════════════════════════════════════════════════════════════
const KEYBOARD_WHITE_KEYS = ['a', 's', 'd', 'f', 'g', 'h', 'j', 'k', 'l'];
const KEYBOARD_BLACK_KEYS = ['w', 'e', 'r', 't', 'y', 'u', 'i', 'o', 'p'];

let currentWhiteStartIdx = WHITE_KEYS.findIndex(w => w.midi === 60);
if (currentWhiteStartIdx < 0) currentWhiteStartIdx = 23;

const pressedKeys = new Set();
const activeKeyboardNotes = new Map();

function updateKeyboardHotkeys() {
  document.querySelectorAll('.hotkey-label').forEach(el => el.textContent = '');

  const isKeyboardMode = (midiInSelect.value === 'keyboard');
  const keysContainerEl = document.getElementById('keys');
  
  if (isKeyboardMode) {
    keysContainerEl.classList.add('show-hotkeys');
  } else {
    keysContainerEl.classList.remove('show-hotkeys');
    return;
  }

  for (let i = 0; i < 9; i++) {
    const whiteIdx = currentWhiteStartIdx + i;
    if (whiteIdx >= WHITE_KEYS.length) break;
    
    const wkeyObj = WHITE_KEYS[whiteIdx];
    const wKeyEl = document.querySelector(`.wkey[data-midi="${wkeyObj.midi}"]`);
    if (wKeyEl) {
      const label = wKeyEl.querySelector('.hotkey-label');
      if (label) label.textContent = KEYBOARD_WHITE_KEYS[i].toUpperCase();
    }

    const nextMidi = wkeyObj.midi + 1;
    if (BLACK_SET.has(NOTE_NAMES[nextMidi % 12])) {
      const bKeyEl = document.querySelector(`.bkey[data-midi="${nextMidi}"]`);
      if (bKeyEl) {
        const label = bKeyEl.querySelector('.hotkey-label');
        if (label) label.textContent = KEYBOARD_BLACK_KEYS[i].toUpperCase();
      }
    }
  }
}

window.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
  if (midiInSelect.value !== 'keyboard') return;

  const key = e.key.toLowerCase();

  let indexChanged = false;
  if (key === '2') {
    currentWhiteStartIdx += 7;
    indexChanged = true;
  } else if (key === '1') {
    currentWhiteStartIdx -= 7;
    indexChanged = true;
  } else if (key === '4') {
    currentWhiteStartIdx += 1;
    indexChanged = true;
  } else if (key === '3') {
    currentWhiteStartIdx -= 1;
    indexChanged = true;
  }

  if (indexChanged) {
    currentWhiteStartIdx = Math.max(0, Math.min(WHITE_KEYS.length - 9, currentWhiteStartIdx));
    updateKeyboardHotkeys();
    
    const startW = WHITE_KEYS[currentWhiteStartIdx];
    setStatus(`Aloitusnuotti siirretty: ${startW.note}${Math.floor((startW.midi-12)/12)}`, true);
    return;
  }

  if (pressedKeys.has(key)) return;

  let targetMidi = null;

  const wIdx = KEYBOARD_WHITE_KEYS.indexOf(key);
  if (wIdx >= 0) {
    const whiteIdx = currentWhiteStartIdx + wIdx;
    if (whiteIdx < WHITE_KEYS.length) {
      targetMidi = WHITE_KEYS[whiteIdx].midi;
    }
  } else {
    const bIdx = KEYBOARD_BLACK_KEYS.indexOf(key);
    if (bIdx >= 0) {
      const whiteIdx = currentWhiteStartIdx + bIdx;
      if (whiteIdx < WHITE_KEYS.length) {
        const baseWk = WHITE_KEYS[whiteIdx];
        const candidateMidi = baseWk.midi + 1;
        if (BLACK_SET.has(NOTE_NAMES[candidateMidi % 12])) {
          targetMidi = candidateMidi;
        }
      }
    }
  }

  if (targetMidi !== null) {
    pressedKeys.add(key);
    activeKeyboardNotes.set(key, targetMidi);
    userPlayedNoteOn(targetMidi, 100);
  }
});

window.addEventListener('keyup', (e) => {
  const key = e.key.toLowerCase();
  if (pressedKeys.has(key)) {
    pressedKeys.delete(key);
    const midi = activeKeyboardNotes.get(key);
    if (midi !== undefined) {
      userPlayedNoteOff(midi);
      activeKeyboardNotes.delete(key);
    }
  }
});

window.addEventListener('blur', () => {
  pressedKeys.forEach(key => {
    const midi = activeKeyboardNotes.get(key);
    if (midi !== undefined) {
      userPlayedNoteOff(midi);
    }
  });
  pressedKeys.clear();
  activeKeyboardNotes.clear();
});

// ═══════════════════════════════════════════════════════════════
// MIDI IN / OUT LIITÄNNÄT
// ═══════════════════════════════════════════════════════════════
let midiAccess=null, midiOutPort=null, midiInPort=null;
let midiOutSelect=document.getElementById('midi-out-select');
let midiInSelect=document.getElementById('midi-in-select');
let midiInIndicator=document.getElementById('midi-in-indicator');

async function initMidi(){
  if(!navigator.requestMIDIAccess)return;
  try{
    midiAccess=await navigator.requestMIDIAccess();
    populateMidiOutputs();
    populateMidiInputs();
    midiAccess.onstatechange=()=>{ populateMidiOutputs(); populateMidiInputs(); };
  }catch(e){}
}

function populateMidiOutputs(){
  const prev=midiOutSelect.value;
  while(midiOutSelect.options.length>1)midiOutSelect.remove(1);
  midiAccess.outputs.forEach((port,id)=>{
    const opt=document.createElement('option'); opt.value=id; opt.textContent=port.name;
    midiOutSelect.appendChild(opt);
  });
  if(prev)midiOutSelect.value=prev;
  updateMidiOutPort();
}

function populateMidiInputs(){
  const prev=midiInSelect.value;
  while(midiInSelect.options.length>2)midiInSelect.remove(2);
  midiAccess.inputs.forEach((port,id)=>{
    const opt=document.createElement('option'); opt.value=id; opt.textContent=port.name;
    midiInSelect.appendChild(opt);
  });
  if(prev)midiInSelect.value=prev;
  updateMidiInPort();
}

midiOutSelect.addEventListener('change',updateMidiOutPort);
midiInSelect.addEventListener('change', () => {
  updateMidiInPort();
  updateKeyboardHotkeys();
});

function updateMidiOutPort(){ midiOutPort=midiOutSelect.value&&midiAccess?midiAccess.outputs.get(midiOutSelect.value):null; }
function updateMidiInPort(){
  if(midiInPort){ midiInPort.onmidimessage=null; }
  const val = midiInSelect.value;
  if (val === 'keyboard' || !val) {
    midiInPort = null;
  } else if (midiAccess) {
    midiInPort = midiAccess.inputs.get(val);
  }
  if(midiInPort){ midiInPort.onmidimessage=onMidiInMessage; }
}

let midiInFlashTimeout=null;
function flashMidiIn(){
  midiInIndicator.classList.add('active');
  clearTimeout(midiInFlashTimeout);
  midiInFlashTimeout=setTimeout(()=>midiInIndicator.classList.remove('active'),120);
}

function onMidiInMessage(e){
  const [status,note,velocity]=e.data;
  const type=status&0xF0;
  if(type===0x90&&velocity>0){
    flashMidiIn();
    userPlayedNoteOn(note, velocity);
  } else if(type===0x80||(type===0x90&&velocity===0)){
    userPlayedNoteOff(note);
  }
}

function sendMidiNote(midi,vel=100){ if(midiOutPort)midiOutPort.send([0x90,midi,vel]); }
function sendMidiNoteOff(midi){ if(midiOutPort)midiOutPort.send([0x80,midi,0]); }
initMidi();
updateKeyboardHotkeys();

// ═══════════════════════════════════════════════════════════════
// MIDI PARSER & PLAYBACK (SOUND TRIGGERED ON STAR IMPACT / LINE TRIGGER)
// ═══════════════════════════════════════════════════════════════
function parseMidi(buffer){ const dv=new DataView(buffer); let pos=0; const ru32=()=>{const v=dv.getUint32(pos);pos+=4;return v;}, ru16=()=>{const v=dv.getUint16(pos);pos+=2;return v;}, ru8=()=>dv.getUint8(pos++), rVLQ=()=>{let v=0,b;do{b=ru8();v=(v<<7)|(b&0x7F);}while(b&0x80);return v;}; if(ru32()!==0x4D546864)throw new Error('Ei MIDI'); const hLen=ru32(),format=ru16(),numTracks=ru16(),timeDivision=ru16(); pos=8+hLen; const tracks=[]; for(let t=0;t<numTracks;t++){ if(ru32()!==0x4D54726B)continue; const tEnd=pos+ru32(); const evs=[]; let tick=0,last=0; while(pos<tEnd){ tick+=rVLQ(); let sb=ru8(); if(sb&0x80){last=sb;}else{pos--;sb=last;} const type=sb>>4; if(type===0x9){const n=ru8(),v=ru8();evs.push({tick,type:v>0?'noteOn':'noteOff',note:n,velocity:v});} else if(type===0x8){const n=ru8(),v=ru8();evs.push({tick,type:'noteOff',note:n,velocity:v});} else if(type===0xA||type===0xB||type===0xE){ru8();ru8();} else if(type===0xC||type===0xD){ru8();} else if(sb===0xFF){const mt=ru8(),ml=rVLQ(); if(mt===0x51){const a=ru8(),b=ru8(),c=ru8();evs.push({tick,type:'tempo',bpm:Math.round(60000000/(a*65536+b*256+c))});} else pos+=ml;} else if(sb===0xF0||sb===0xF7){pos+=rVLQ();}} pos=tEnd; tracks.push(evs);} return {timeDivision,tracks};}
function flattenTracks(midi){ const tpb=midi.timeDivision; const all=[]; midi.tracks.forEach(tr=>tr.forEach(e=>all.push({...e}))); all.sort((a,b)=>a.tick-b.tick||(a.type==='noteOff'?-1:0)); const tempos=all.filter(e=>e.type==='tempo'); function ticksToMs(tick){ let ms=0,t0=0,bpm0=120; for(const tm of tempos){ if(tm.tick>=tick)break; ms+=(tm.tick-t0)/tpb*(60000/bpm0); t0=tm.tick; bpm0=tm.bpm;} ms+=(tick-t0)/tpb*(60000/bpm0); return ms;} return all.filter(e=>e.type==='noteOn'||e.type==='noteOff').map(e=>({...e,ms:ticksToMs(e.tick)}));}
let midiEvents=null, playTimers=[], isPlaying=false, totalDurationMs=0, playStartTime=null, progressInterval;
const playBtn=document.getElementById('play-btn'), stopBtn=document.getElementById('stop-btn'), statusEl=document.getElementById('status'), progressBar=document.getElementById('progress-bar');

document.getElementById('file-input').addEventListener('change', function(e){ 
  const file=e.target.files[0]; 
  if(!file)return; 
  const reader=new FileReader(); 
  reader.onload=function(ev){ 
    try{ 
      const midi=parseMidi(ev.target.result); 
      midiEvents=flattenTracks(midi); 
      if(!midiEvents.length){setStatus('Ei nuotteja',false);return;} 
      totalDurationMs=Math.max(...midiEvents.map(e=>e.ms)); 
      setStatus(file.name+' — '+midiEvents.length+' tapahtumaa',true); 
      playBtn.classList.add('playing'); 
      if (learnMode) {
        prepareLearnSteps();
      }
    }catch(err){setStatus('Virhe: '+err.message,false);} 
  }; 
  reader.readAsArrayBuffer(file); 
});

function setStatus(msg,active){statusEl.textContent=msg;statusEl.className=active?'active':'';}

const STAR_FALL_DURATION = 500; // Alkuperäinen pudotusaika pystytilassa

function startPlayback() {
  getAudioCtx();
  isPlaying = true;
  playStartTime = performance.now();
  
  if (clefMode) {
    setStatus('▶ Toistetaan... (viivastotila)', true);
  } else {
    setStatus('▶ Toistetaan... (stars falling)', true);
  }

  const durations = new Map();
  const openNotes = new Map();
  midiEvents.forEach((ev, idx) => {
    if (ev.type === 'noteOn' && ev.velocity > 0) {
      openNotes.set(ev.note, {idx, ms: ev.ms});
    } else if (ev.type === 'noteOff' || (ev.type === 'noteOn' && ev.velocity === 0)) {
      const open = openNotes.get(ev.note);
      if (open) { durations.set(open.idx, ev.ms - open.ms); openNotes.delete(ev.note); }
    }
  });

  const slideDuration = clefMode ? 2000 : STAR_FALL_DURATION;

  midiEvents.forEach((ev, idx) => {
    if (ev.type !== 'noteOn' || ev.velocity === 0) return;
    const hitTime = ev.ms;
    const spawnTime = Math.max(0, hitTime - slideDuration);
    const noteDur = durations.get(idx) || 400;

    const spawnTimer = setTimeout(() => {
      if (!isPlaying) return;
      spawnGoldenNoteWithCallback(ev.note, (midi) => {
        if (!isPlaying) return;
        pressKeyVisual(midi);
        playTone(midi, ev.velocity, Math.max(0.3, noteDur / 1000));
        sendMidiNote(midi, ev.velocity);
        trackActiveNote(midi);
        setTimeout(() => {
          releaseKeyVisual(midi);
          sendMidiNoteOff(midi);
          untrackActiveNote(midi);
        }, noteDur || 700);
      }, noteDur);
    }, spawnTime);
    playTimers.push(spawnTimer);
  });

  playTimers.push(setTimeout(() => {
    stopPlayback();
    setStatus('✓ Toisto päättyi', true);
  }, totalDurationMs + slideDuration + 500));
  
  progressInterval = setInterval(() => {
    const elapsed = performance.now() - playStartTime;
    progressBar.style.width = Math.min(100, (elapsed / (totalDurationMs + slideDuration)) * 100) + '%';
  }, 50);
}

function stopPlayback() {
  isPlaying = false;
  playTimers.forEach(clearTimeout);
  playTimers = [];
  clearInterval(progressInterval);
  progressBar.style.width = '0%';
  document.querySelectorAll('.wkey.active, .bkey.active').forEach(el => el.classList.remove('active'));
  activeChordNotes.clear();
  updateChordDisplay();
  setStatus('■ Pysäytetty', false);
}

playBtn.addEventListener('click', () => {
  if (!midiEvents) { setStatus('Lataa ensin MIDI-tiedosto', false); return; }
  if (isPlaying) stopPlayback();
  if (learnMode) toggleLearnMode(false);
  startPlayback();
});
stopBtn.addEventListener('click', stopPlayback);

// ═══════════════════════════════════════════════════════════════
// OPI-TILAN ALUSTUS & REAALIAIKAINEN TOIMINTA
// ═══════════════════════════════════════════════════════════════
const learnBtn = document.getElementById('learn-btn');

// Tuiki Tuiki Tähtönen (Nuottilista MIDI-arvoina)
const TUIKI_TUIKI = [
  60, 60, 67, 67, 69, 69, 67,
  65, 65, 64, 64, 62, 62, 60,
  67, 67, 65, 65, 64, 64, 62,
  67, 67, 65, 65, 64, 64, 62,
  60, 60, 67, 67, 69, 69, 67,
  65, 65, 64, 64, 62, 62, 60
];

function prepareLearnSteps() {
  let steps = [];
  
  if (midiEvents && midiEvents.length > 0) {
    // Luodaan askeleet ladatusta MIDI-tiedostosta
    const noteOns = midiEvents.filter(ev => ev.type === 'noteOn' && ev.velocity > 0);
    
    // Ryhmitellään soinnut/lähellä olevat nuotit samalle askeleelle
    let activeGroup = [];
    let lastMs = -999;
    
    noteOns.forEach(ev => {
      if (ev.ms - lastMs > 60) {
        if (activeGroup.length > 0) {
          steps.push(activeGroup);
        }
        activeGroup = [ev.note];
        lastMs = ev.ms;
      } else {
        if (!activeGroup.includes(ev.note)) {
          activeGroup.push(ev.note);
        }
      }
    });
    if (activeGroup.length > 0) {
      steps.push(activeGroup);
    }
  } else {
    // Jos MIDI-tiedostoa ei ole ladattu, käytetään Tuiki Tuiki Tähtöstä
    steps = TUIKI_TUIKI.map(note => [note]);
  }

  // Muutetaan askeleet seurantamuotoon
  learnSteps = steps.map(notes => {
    const hitMap = {};
    notes.forEach(n => { hitMap[n] = false; });
    return {
      notes: notes,
      hitMap: hitMap,
      completed: false
    };
  });

  learnIndex = 0;
  slideOffset = 0;
}

function toggleLearnMode(forceState) {
  learnMode = (forceState !== undefined) ? forceState : !learnMode;
  learnBtn.classList.toggle('active-learn', learnMode);
  
  if (learnMode) {
    if (isPlaying) stopPlayback();
    
    // Pakotetaan viivasto päälle, jotta askeleet näkyvät oikein
    if (!clefMode) {
      clefMode = true;
      clefBtn.classList.add('active-clef');
    }
    
    prepareLearnSteps();
    const modeName = midiEvents ? 'Oma MIDI' : 'Tuiki Tuiki Tähtönen';
    setStatus(`Opi-tila päällä: ${modeName} (${learnSteps.length} askelta)`, true);
  } else {
    setStatus('Opi-tila poistettu käytöstä', false);
  }
  fallingNotes = []; // tyhjennetään näytön nuotit häiriöiden välttämiseksi
}

learnBtn.addEventListener('click', () => {
  toggleLearnMode();
});
</script>
